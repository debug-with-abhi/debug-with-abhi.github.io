<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abhishek | Advanced Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{background:#020617;color:#fff;overflow-x:hidden}

header{
  position:fixed;
  width:100%;
  padding:15px 40px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(12px);
  z-index:1000;
}

header h1{color:#38bdf8}
nav a{margin-left:20px;color:#fff;text-decoration:none;transition:.3s}
nav a:hover{color:#38bdf8}

section{min-height:100vh;padding:100px 40px}

.hero{
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.hero h2{font-size:48px}

.typing{
  color:#38bdf8;
  border-right:3px solid #38bdf8;
  white-space:nowrap;
  overflow:hidden;
}

.btn{
  margin-top:30px;
  padding:12px 25px;
  background:#38bdf8;
  border:none;
  border-radius:30px;
  cursor:pointer;
}

.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.card{
  background:#0f172a;
  padding:20px;
  border-radius:15px;
  transition:.4s;
}

.card:hover{
  transform:translateY(-10px) scale(1.05);
  box-shadow:0 0 20px rgba(56,189,248,0.5);
}

.skills .bar{
  margin:15px 0;
}

.bar span{
  display:block;
  height:8px;
  background:#38bdf8;
  border-radius:10px;
}

footer{text-align:center;padding:20px;background:#000}

canvas{
  position:fixed;
  top:0;left:0;
  z-index:-1;
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<header>
  <h1>Abhishek</h1>
  <nav>
    <a href="#">Home</a>
    <a href="#about">About</a>
    <a href="#skills">Skills</a>
    <a href="#projects">Projects</a>
  </nav>
</header>

<section class="hero">
  <h2>Hi, I'm Abhishek 👋</h2>
  <h3 class="typing" id="typing"></h3>
  <button class="btn">View Work</button>
</section>

<section id="about">
  <h2>About Me</h2>
  <p>I am a developer passionate about Web Development, Cloud (AWS), and building real-world projects.</p>
</section>

<section id="skills" class="skills">
  <h2>Skills</h2>
  <div class="bar">HTML<span style="width:90%"></span></div>
  <div class="bar">CSS<span style="width:85%"></span></div>
  <div class="bar">JavaScript<span style="width:75%"></span></div>
  <div class="bar">AWS<span style="width:70%"></span></div>
</section>

<section id="projects">
  <h2>Projects</h2>
  <div class="cards">
    <div class="card">Portfolio Website</div>
    <div class="card">AWS EC2 Hosting</div>
    <div class="card">Automation Scripts</div>
  </div>
</section>

<footer>
  <p>GitHub: github.com/debug-with-abhi</p>
</footer>

<script>

// Typing animation
const text = ["Creative Developer","AWS Enthusiast","Problem Solver"];
let i=0,j=0,current="",isDeleting=false;

function type(){
  current = text[i];
  if(!isDeleting){
    document.getElementById("typing").textContent = current.substring(0,j++);
    if(j>current.length){isDeleting=true;setTimeout(type,1000);return;}
  } else {
    document.getElementById("typing").textContent = current.substring(0,j--);
    if(j==0){isDeleting=false;i=(i+1)%text.length;}
  }
  setTimeout(type,isDeleting?50:100);
}
type();

// Particle background
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];
for(let i=0;i<80;i++){
  particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:2,dx:Math.random()-0.5,dy:Math.random()-0.5});
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle='#38bdf8';
    ctx.fill();
    p.x+=p.dx; p.y+=p.dy;
  });
  requestAnimationFrame(animate);
}
animate();

</script>

</body>
</html>
