<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Portfolio</title>

<style>

body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#f4f4f4;
}

header{
    background:#0077cc;
    color:white;
    text-align:center;
    padding:20px;
}

.container{
    width:90%;
    max-width:1000px;
    margin:30px auto;
}

.buttons{
    display:flex;
    flex-wrap:wrap;
    gap:15px;
    justify-content:center;
    margin-bottom:30px;
}

button{
    width:80px;
    height:80px;
    font-size:25px;
    font-weight:bold;
    border:none;
    border-radius:10px;
    background:#0077cc;
    color:white;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#005fa3;
    transform:scale(1.05);
}

#codeBox{
    display:none;
    background:white;
    border-radius:10px;
    padding:20px;
    box-shadow:0 0 10px rgba(0,0,0,.2);
}

#title{
    text-align:center;
    color:#0077cc;
}

pre{
    background:#272822;
    color:#00ff66;
    padding:20px;
    overflow:auto;
    white-space:pre-wrap;
    word-wrap:break-word;
    border-radius:8px;
    font-size:15px;
}

</style>
</head>

<body>

<header>
<h1>My HTML Projects Portfolio</h1>
<p>Click any project number to view its source code.</p>
</header>

<div class="container">

<div class="buttons">

<button onclick="showCode(3)">3</button>
<button onclick="showCode(4)">4</button>
<button onclick="showCode(5)">5</button>
<button onclick="showCode(8)">8</button>
<button onclick="showCode(9)">9</button>
<button onclick="showCode(11)">11</button>

</div>

<div id="codeBox">

<h2 id="title"></h2>

<pre><code id="code"></code></pre>

</div>

</div>

<script>

/* Paste your entire projects object here */

const projects = {

3:`<!DOCTYPE html>
<html>
<head>
<title>Registration Form</title>
</head>
<body bgcolor="yellow">
<h2>Creating a Registration Form</h2>

<form>

<label>Firstname:</label>
<input type="text" name="firstname" size="15"><br><br>

<label>Lastname:</label>
<input type="text" name="lastname" size="15"><br><br>

<label>Course:</label>

<select>
<option>Course</option>
<option>BCA</option>
<option>BBA</option>
<option>B.Com</option>
<option>B.Sc</option>
<option>B.A</option>
</select>

<br><br>

<label>Gender:</label><br>

<input type="radio" name="gender"> Male<br>
<input type="radio" name="gender"> Female

<br><br>

<label>Hobbies:</label><br>

<input type="checkbox"> Programming<br>
<input type="checkbox"> Sports<br>
<input type="checkbox"> Singing<br>
<input type="checkbox"> Reading

<br><br>

<label>Address:</label><br>

<textarea cols="60" rows="5"></textarea>

<br><br>

<input type="submit" value="Submit">
<input type="reset" value="Reset">

</form>

</body>
</html>`,

4:`Paste your Project 4 code here`,

5:`Paste your Project 5 code here`,

8:`Paste your Project 8 code here`,

9:`Paste your Project 9 code here`,

11:`Paste your Project 11 code here`

};

function showCode(number){

document.getElementById("codeBox").style.display="block";

document.getElementById("title").innerHTML="Project " + number;

document.getElementById("code").textContent=projects[number];

}

</script>

</body>
</html>
