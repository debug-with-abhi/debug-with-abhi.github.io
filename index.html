<!DOCTYPE html>
<html>
<head>
    <title>Smart Queue Predictor</title>
    <link rel='stylesheet' href='{{ url_for("static", filename="style.css") }}'>
</head>
<body>

<div class='container'>
    <h1>🤖 Smart Queue Management System</h1>
    <p>AI-Based Waiting Time Prediction</p>

    <form action='/predict' method='POST'>

        <label>Number of People Ahead</label>
        <input type='number' name='people' required>

        <label>Average Service Time (minutes)</label>
        <input type='number' name='service_time' required>

        <button type='submit'>Predict Waiting Time</button>
    </form>

    {% if prediction %}
    <div class='result'>
        <h2>Prediction Result</h2>
        <p><strong>People Ahead:</strong> {{ people }}</p>
        <p><strong>Service Time:</strong> {{ service_time }} min</p>
        <p><strong>Estimated Waiting Time:</strong> {{ prediction }} minutes</p>
    </div>
    {% endif %}
</div>

</body>
</html>
