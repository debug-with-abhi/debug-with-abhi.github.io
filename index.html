<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abhishek | Pro Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{background:#020617;color:#fff;transition:.3s}

.light{background:#f1f5f9;color:#000}

header{
  position:fixed;width:100%;padding:15px 40px;display:flex;justify-content:space-between;align-items:center;background:rgba(0,0,0,0.4);backdrop-filter:blur(12px);z-index:1000;
}

nav a{margin-left:20px;color:#fff;text-decoration:none}

.toggle{
  cursor:pointer;
  padding:5px 10px;
  background:#38bdf8;
  border-radius:10px;
}

section{min-height:100vh;padding:100px 40px}

.hero{text-align:center}
.hero h2{font-size:48px}

.typing{color:#38bdf8;border-right:2px solid}

.btn{
  margin-top:20px;padding:10px 20px;background:#38bdf8;border:none;border-radius:20px;cursor:pointer
}

.cards{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;
}

.card{
  background:#0f172a;padding:20px;border-radius:15px;transition:.4s;transform-style:preserve-3d;
}

.card:hover{
  transform:rotateY(10deg) rotateX(10deg) scale(1.05);
}

.skills .bar{margin:15px 0}
.bar span{display:block;height:8px;background:#38bdf8;border-radius:10px}

footer{text-align:center;padding:20px}

canvas{position:fixed;top:0;left:0;z-index:-1}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<header>
  <h2>Abhishek</h2>
  <nav>
    <a href="#">Home</a>
    <a href="#skills">Skills</a>
    <a href="#projects">Projects</a>
  </nav>
  <div class="toggle" onclick="toggleMode()">Mode</div>
</header>

<section class="hero">
  <h2>Hi, I'm Abhishek</h2>
  <h3 id="typing" class="typing"></h3>
  <button class="btn">Download Resume</button>
</section>

<section id="skills" class="skills">
  <h2>Skills</h2>
  <div class="bar">HTML<span style="width:90%"></span></div>
  <div class="bar">CSS<span style="width:85%"></span></div>
  <div class="bar">JavaScript<span style="width:75%"></span></div>
  <div class="bar">AWS<span style="width:70%"></span></div>
</section>

<section id="projects">
  <h2>Projects</h2>
  <div class="cards">
    <div class="card">Portfolio Website</div>
    <div class="card">AWS Hosting</div>
    <div class="card">Automation Tool</div>
  </div>
</section>

<footer>
  <p>GitHub: debug-with-abhi</p>
</footer>

<script>

// Dark mode toggle
function toggleMode(){
  document.body.classList.toggle('light');
}

// Typing effect
const roles=["Developer","Cloud Engineer","Problem Solver"];
let i=0,j=0,text='',del=false;
function type(){
  text=roles[i];
  if(!del){
    document.getElementById('typing').innerHTML=text.slice(0,j++);
    if(j>text.length){del=true;setTimeout(type,1000);return}
  }else{
    document.getElementById('typing').innerHTML=text.slice(0,j--);
    if(j==0){del=false;i=(i+1)%roles.length}
  }
  setTimeout(type,del?50:100);
}
type();

// Particle bg
const c=document.getElementById('bg');
const ctx=c.getContext('2d');
c.width=window.innerWidth;c.height=window.innerHeight;
let p=[];
for(let i=0;i<100;i++){
  p.push({x:Math.random()*c.width,y:Math.random()*c.height,dx:Math.random()-0.5,dy:Math.random()-0.5});
}
function draw(){
  ctx.clearRect(0,0,c.width,c.height);
  p.forEach(e=>{
    ctx.beginPath();ctx.arc(e.x,e.y,2,0,6.28);ctx.fillStyle='#38bdf8';ctx.fill();
    e.x+=e.dx;e.y+=e.dy;
  });
  requestAnimationFrame(draw);
}
draw();

</script>

</body>
</html>
