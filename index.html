def bfs(grid, start, goal):

   rows, cols = len(grid), len(grid[0])
   queue = deque([start]) 
   visited = set([start])
   while queue:
    x, y = queue.popleft()
    if (x, y) = goal:
        return True
     for dx, dy in [(-1,0),(1,0),(0,-1),(0,1)]:
        nx, ny = x+dx, y+dy
        if 0 <= nx < rows and 0 <= ny < cols and grid[nx] [ny] = 0:
           if (nx, ny) not in visited:
               visited.add((nx, ny))
               queue.append((nx, ny))
   return False
