<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projects</title>

<style>

body{
    margin:0;
    font-family:Arial,Helvetica,sans-serif;
    background:#f4f4f4;
}

header{
    background:#0077cc;
    color:white;
    padding:20px;
    text-align:center;
    font-size:32px;
    font-weight:bold;
}

.buttons{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:15px;
    margin:30px;
}

button{
    width:65px;
    height:65px;
    border:none;
    border-radius:50%;
    background:#0077cc;
    color:white;
    font-size:22px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#0056b3;
    transform:scale(1.1);
}

#codeBox{
    width:90%;
    max-width:1100px;
    margin:20px auto;
    background:#1e1e1e;
    color:#00ff88;
    padding:20px;
    border-radius:10px;
    overflow:auto;
    display:none;
}

pre{
    white-space:pre-wrap;
    font-size:15px;
}

</style>
</head>

<body>

<header>Projects</header>

<div class="buttons">

<button onclick="showCode(1)">1</button>
<button onclick="showCode(2)">2</button>
<button onclick="showCode(3)">3</button>
<button onclick="showCode(4)">4</button>
<button onclick="showCode(5)">5</button>
<button onclick="showCode(8)">8</button>
<button onclick="showCode(9)">9</button>
<button onclick="showCode(11)">11</button>
</div>

<div id="codeBox">
<h2 id="title"></h2>
<pre id="code"></pre>
</div>

<script>

const projects = {

1:``,

2:``,

3:``,

4:``,

5:``,

6:``,

8:``,

9:``,

10:``,

11:``,

12:``,

function showCode(number){

document.getElementById("codeBox").style.display="block";

document.getElementById("title").innerHTML="Project " + number;

document.getElementById("code").textContent=projects[number];

}

</script>

</body>
</html>
