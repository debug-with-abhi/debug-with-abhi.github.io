<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projects</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f2f2f2;
    margin:0;
    padding:0;
}

.container{
    width:90%;
    max-width:900px;
    margin:40px auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h1{
    text-align:center;
    color:#0066cc;
}

.buttons{
    text-align:center;
    margin:20px 0;
}

button{
    width:70px;
    height:45px;
    margin:8px;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    border:none;
    border-radius:6px;
    background:#007BFF;
    color:white;
}

button:hover{
    background:#0056b3;
}

#content{
    margin-top:20px;
    border:2px solid #007BFF;
    padding:20px;
    min-height:250px;
    background:#fafafa;
    border-radius:8px;
}

pre{
    white-space:pre-wrap;
    font-size:15px;
}
</style>

</head>
<body>

<div class="container">

<h1>Projects</h1>

<div class="buttons">
<button onclick="showProject(3)">3</button>
<button onclick="showProject(4)">4</button>
<button onclick="showProject(5)">5</button>
<button onclick="showProject(8)">8</button>
<button onclick="showProject(9)">9</button>
<button onclick="showProject(11)">11</button>
</div>

<div id="content">
<h2>Welcome</h2>
<p>Click any project button to view its program.</p>
</div>

</div>

<script>

const projects = {

3: `<!DOCTYPE html>
<html>
<head>
<title>Registration Form</title>
</head>
<body bgcolor="yellow">
<h2>Creating a Registration Form</h2>

<form>

<label>Firstname:</label>
<input type="text" name="firstname" size="15"><br><br>

<label>Lastname:</label>
<input type="text" name="lastname" size="15"><br><br>

<label>Course:</label>

<select>
<option>Course</option>
<option>BCA</option>
<option>BBA</option>
<option>B.Com</option>
<option>B.Sc</option>
<option>B.A</option>
</select>

<br><br>

<label>Gender:</label><br>

<input type="radio" name="gender"> Male<br>
<input type="radio" name="gender"> Female

<br><br>

<label>Hobbies:</label><br>

<input type="checkbox"> Programming<br>
<input type="checkbox"> Sports<br>
<input type="checkbox"> Singing<br>
<input type="checkbox"> Reading

<br><br>

<label>Address:</label><br>

<textarea cols="60" rows="5"></textarea>

<br><br>

<input type="submit" value="Submit">
<input type="reset" value="Reset">

</form>

</body>
</html>`,

4: `
Project 4

Write anything here.

Example:

#include <stdio.h>

int main()
{
    printf("Hello World");
    return 0;
}
`,

5: `
Project 5

Write your project or notes here.

Example:

SELECT * FROM Employees;
`,

8: `
Project 8

Write anything you want here.

Example:

HTML
CSS
JavaScript
`,

9: `
Project 9

Replace this text with your own project.
`,

11: `
Project 11

Replace this text with your own project.
`

};

function showProject(number){

document.getElementById("content").innerHTML =
"<h2>Project " + number + "</h2><pre>" +
projects[number] +
"</pre>";

}

</script>

</body>
</html>
